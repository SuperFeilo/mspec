agents:
  planner:
    model: localllm/qwen/qwen3.6-35b-a3b
    context_length: 8192
    opencode_agent: plan
  builder:
    model: localllm/qwen/qwen3.6-27b:2
    context_length: 16384
    opencode_agent: build
  evaluator:
    model: localllm/qwen/qwen3.6-35b-a3b
    context_length: 8192
    opencode_agent: review
  qa:
    model: localllm/qwen/qwen3.6-27b:2
    context_length: 8192
    opencode_agent: build
  compactor:
    model: localllm/qwen/qwen3.6-27b:2
    context_length: 16384
    direct: true
  embedder:
    model: text-embedding-nomic-embed-text-v1.5
    direct: true

llm:
  base_url: http://127.0.0.1:1234/v1

dashboard:
  port: 8765

projects_dir: ~/harness-projects

global:
  max_retries: 3
  session_poll_interval: 5
